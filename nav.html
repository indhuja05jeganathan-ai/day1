<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body {

            margin: 5px;


        }

        .nav1 {

            background-color: rgb(227, 227, 255);
            background-color: black;
            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-top: 4%;
            margin-left: 30px;
            margin-right: 30px;
            padding: 0px 45px;
            color: white;
            border-radius: 10px;
        }

        ol {
            list-style: none;
            display: flex;
            font-size: larger;
            gap: 30px;
            color: darkgray
        }

        button {

            border-radius: 30px;
            background-color: lightskyblue;
            padding: 10px 25px;
            font-size: 18px;
        }

        a {
            text-decoration: none;
        }

        /* nav2 */
        .nav2 {
            background-color: black;
            color: white;
            display: flex;
            margin: 5% 30px;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
        }

        .c2 {
            display: flex;
            gap: 20px;
        }

        .b2 {
            height: 40px;
            width: 100px;
            margin-top: 5px;
        }


        h3 {
            padding-right: 40px;
        }


        /* nav3 */

        .nav3 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: black;
            color: white;
            margin: 6% 30px;
            padding: 0 40px;
            border-radius: 8px;
        }

        .c3 {
            display: flex;
            gap: 20px;
        }

        .b3 {
            height: 40px;
            width: 100px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="nav1">
        <h3>LOGOBAKERY</h3>
        <nav>
            <ol>
                <li>Services</li>
                <li>Projects</li>
                <li>About</li>

            </ol>
        </nav>
        <button><a href="#">Contact</a></button>
    </div>


    <div class="nav2">

        <div class="c2">
            <nav class="na2">
                <ol class="l2">
                    <li>Services</li>
                    <li>Projects</li>
                    <li>About</li>

                </ol>

            </nav>
            <button class="b2"><a href="#">Contact</a></button>
        </div>
        <div class="l2">
            <h3 class="logo2">LOGOBAKERY</h3>
        </div>

    </div>


    <div class="nav3">

        <div class="l3">
            <h3 class="logo3">LOGOBAKERY</h3>
        </div>
        <div class="c3">
            <nav class="na3">
                <ol class="l3">
                    <li>Services</li>
                    <li>Projects</li>
                    <li>About</li>

                </ol>

            </nav>
            <button class="b3"><a href="#">Contact</a></button>
        </div>

    </div>
</body>

</html>
